name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  nix-flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Run flake checks
        run: nix flake check --no-build

  nixfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Check Nix formatting (nixfmt-rfc-style)
        run: |
          nix run nixpkgs#nixfmt-rfc-style -- --check \
            flake.nix \
            $(find modules hosts home overlays pkgs -name '*.nix' 2>/dev/null | tr '\n' ' ')

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Shellcheck scripts
        run: git ls-files '*.sh' | xargs -r shellcheck

