name: CI

on:
  push:
    branches: ["main"]
  pull_request:

# Cancel in-progress runs for the same branch/PR on new pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  nix-flake-check:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Cache Nix store
        uses: DeterminateSystems/flakehub-cache-action@v3

      - name: Pre-fetch all flake inputs
        run: nix flake archive --json > /dev/null

      - name: Run flake checks
        run: nix flake check --no-build

  nixfmt:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Cache Nix store
        uses: DeterminateSystems/flakehub-cache-action@v3

      - name: Check Nix formatting (nixfmt-tree)
        run: |
          nix fmt
          git diff --exit-code

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Shellcheck scripts
        # tmux-sessionizer is a bash script without the .sh extension
        run: git ls-files '*.sh' 'config/scripts/tmux-sessionizer' | xargs -r shellcheck

  lint:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Cache Nix store
        uses: DeterminateSystems/flakehub-cache-action@v3

      - name: statix
        run: nix develop --command statix check .

      - name: deadnix
        run: nix develop --command deadnix --fail .
