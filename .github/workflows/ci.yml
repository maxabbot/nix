name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  nix-flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Run flake checks
        run: >-
          nix flake check --no-build
          --update-input lanzaboote
          --update-input stylix
          --update-input nix-index-database
          --update-input apollo-flake

  nixfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Check Nix formatting (nixfmt-rfc-style)
        run: |
          nix run nixpkgs#nixfmt-rfc-style -- \
            flake.nix \
            $(find modules hosts home overlays pkgs -name '*.nix' 2>/dev/null | tr '\n' ' ')
          git diff --exit-code

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Shellcheck scripts
        run: git ls-files '*.sh' | xargs -r shellcheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: statix
        run: nix run nixpkgs#statix -- check .

      - name: deadnix
        run: nix run nixpkgs#deadnix -- --fail .

