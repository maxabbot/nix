name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Shellcheck scripts
        run: git ls-files '*.sh' | xargs -r shellcheck

  ansible-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible + ansible-lint
        run: pip install ansible ansible-lint

      - name: Install Galaxy collections
        run: ansible-galaxy collection install -r system/requirements.yml

      - name: Lint playbooks
        run: |
          cd system
          ansible-lint --profile=basic --exclude roles/aur playbooks/site.yml

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: sudo apt-get install -y bats

      - name: Run bats tests
        run: |
          if compgen -G "tests/*.bats" > /dev/null; then
            bats tests/
          else
            echo "No bats tests found — skipping."
          fi
