---
# =============================================================================
# Home Desktop Profile — RTX 40-series, gaming focus
# =============================================================================

power_management: power-profiles-daemon

enable_btrfs_snapshots: true
enable_database_servers: true
enable_gui_db_clients: true
enable_creative_suite: true
enable_cuda_stack: true
install_apollo: false

# Roles applied for this profile
profile_roles:
  - base
  - development
  - productivity
  - nvidia
  - gaming
