---
# =============================================================================
# Site Playbook — main entry point
# Applies roles based on the active profile (home_desktop / work_laptop)
# =============================================================================
# Usage:
#   ansible-playbook playbooks/site.yml
#   ansible-playbook playbooks/site.yml --tags base,development
#   ansible-playbook playbooks/site.yml --skip-tags gaming

- name: Arch Linux system configuration
  hosts: all
  gather_facts: true

  pre_tasks:
    - name: Check if AUR helper is available
      ansible.builtin.command: which yay
      register: yay_check
      failed_when: false
      changed_when: false
      tags: [always]

    - name: Detect packages blocking upgrade (soname conflicts)
      ansible.builtin.shell: |
        pacman -Syu --print 2>&1 | grep -oP "required by \K\S+" | sort -u
      become: true
      register: blocking_pkgs
      changed_when: false
      failed_when: false
      tags: [always]

    - name: Remove packages with dep conflicts to unblock upgrade
      ansible.builtin.command: >-
        pacman -Rdd --noconfirm
        {{ blocking_pkgs.stdout_lines | select('ne', '') | join(' ') }}
      become: true
      when: (blocking_pkgs.stdout_lines | select('ne', '') | list) | length > 0
      tags: [always]

    - name: Update system packages (with AUR helper)
      ansible.builtin.command: yay -Syu --noconfirm --answerdiff=None --answeredit=None
      become: false
      register: yay_upgrade
      changed_when: "'nothing to do' not in yay_upgrade.stdout | lower"
      when: yay_check.rc == 0
      tags: [always]

    - name: Update system packages (pacman fallback)
      community.general.pacman:
        update_cache: true
        upgrade: true
      become: true
      when: yay_check.rc != 0
      tags: [always]

  roles:
    - role: aur
      tags: [aur, always]

    - role: base
      tags: [base]
      when: "'base' in (profile_roles | default(['base']))"

    - role: development
      tags: [development]
      when: "'development' in (profile_roles | default([]))"

    - role: productivity
      tags: [productivity]
      when: "'productivity' in (profile_roles | default([]))"

    - role: nvidia
      tags: [nvidia]
      when: "'nvidia' in (profile_roles | default([]))"

    - role: gaming
      tags: [gaming]
      when: "'gaming' in (profile_roles | default([]))"
