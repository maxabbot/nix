# ============================================================================
# Session-wide theming environment variables
# Loaded by systemd --user for all user services and the login session.
# Ensures GTK/Qt/cursor theme is consistent across native apps AND Flatpaks.
# ============================================================================

# GTK theme
GTK_THEME=Gruvbox-Material-Dark
GTK2_RC_FILES=/usr/share/themes/Gruvbox-Material-Dark/gtk-2.0/gtkrc

# Cursor
XCURSOR_THEME=capitaine-cursors
XCURSOR_SIZE=24

# Qt — use qt5ct/qt6ct for theme config (kvantum handles the actual look)
QT_QPA_PLATFORMTHEME=qt5ct
QT_STYLE_OVERRIDE=kvantum
QT_AUTO_SCREEN_SCALE_FACTOR=1

# Wayland-native hints for Electron apps (VSCode, Discord, Obsidian, etc.)
ELECTRON_OZONE_PLATFORM_HINT=auto

# Firefox native Wayland
MOZ_ENABLE_WAYLAND=1

# Java AWT — fixes blank windows in IntelliJ / AWT apps on Wayland
_JAVA_AWT_WM_NONREPARENTING=1
