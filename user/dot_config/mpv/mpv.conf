# ============================================================================
# mpv — hardware-accelerated, uosc UI, Gruvbox Material Dark
# ============================================================================

# --- Video ---
vo=gpu-next
gpu-api=vulkan
# NVIDIA hardware decoding (falls back to software if unavailable)
hwdec=nvdec-copy
hwdec-codecs=all

video-sync=display-resync
interpolation=yes
tscale=oversample

# --- Audio ---
ao=pipewire
volume=80
volume-max=150
audio-normalize-downmix=yes

# --- Behaviour ---
save-position-on-quit=yes
keep-open=yes
autofit-larger=90%x90%
geometry=50%:50%
no-border

# --- OSD (hidden by uosc, kept as fallback) ---
osd-font="FiraCode Nerd Font"
osd-font-size=28
osd-color="#d4be98"
osd-shadow-color="#282828"
osd-shadow-offset=2
osd-duration=2000
# uosc replaces the built-in OSC
osc=no
osd-bar=no

# --- Subtitles ---
sub-auto=fuzzy
sub-font="FiraCode Nerd Font"
sub-font-size=36
sub-color="#d4be98"
sub-back-color="#28282880"
sub-border-size=0

# --- Screenshots ---
screenshot-directory=~/Pictures/Screenshots
screenshot-template="%F_%wH:%wM:%wS"
screenshot-format=png

# --- ytdl-hook ---
ytdl-format=bestvideo[height<=?1080]+bestaudio/best

# --- Script settings ---
# thumbfast: hardware thumbnail generation for uosc seek bar
# sponsorblock: auto-skip YouTube sponsor segments
script-opts=sponsorblock-enabled=yes,sponsorblock-skip_categories=sponsor|selfpromo|interaction
