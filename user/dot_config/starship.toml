# ============================================================================
# Starship Prompt — Gruvbox Material Dark
# https://starship.rs/config/
# ============================================================================

"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](#282828)\
$os\
$username\
[](bg:#3c3836 fg:#282828)\
$directory\
[](fg:#3c3836 bg:#504945)\
$git_branch\
$git_status\
[](fg:#504945 bg:#665c54)\
$python\
$nodejs\
$rust\
$golang\
$java\
[](fg:#665c54 bg:#282828)\
$time\
[ ](fg:#282828)\
\n$character"""

[os]
disabled = false
style = "bg:#282828 fg:#d3869b"

[os.symbols]
Arch = " "
Fedora = " "
Ubuntu = " "
Debian = " "
NixOS = " "
Macos = " "
Windows = " "

[username]
show_always = true
style_user = "bg:#282828 fg:#d4be98"
style_root = "bg:#282828 fg:#ea6962"
format = '[$user ]($style)'
disabled = false

[directory]
style = "bg:#3c3836 fg:#7daea3"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Videos" = " "
"Projects" = "󰲋 "
".config" = " "

[git_branch]
symbol = ""
style = "bg:#504945 fg:#a9b665"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#504945 fg:#ea6962"
format = '[$all_status$ahead_behind ]($style)'
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = "✓"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[python]
symbol = ""
style = "bg:#665c54 fg:#d8a657"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = ""
style = "bg:#665c54 fg:#a9b665"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bg:#665c54 fg:#e78a4e"
format = '[ $symbol ($version) ]($style)'

[golang]
symbol = ""
style = "bg:#665c54 fg:#89b482"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = ""
style = "bg:#665c54 fg:#ea6962"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%H:%M"
style = "bg:#282828 fg:#7c6f64"
format = '[ 󰥔 $time ]($style)'

[character]
success_symbol = '[❯](bold fg:#a9b665)'
error_symbol = '[❯](bold fg:#ea6962)'
vimcmd_symbol = '[❮](bold fg:#d3869b)'
