# ============================================================================
# Foot Terminal — Gruvbox Material Dark
# ============================================================================

[main]
font=FiraCode Nerd Font:size=12
pad=8x8
dpi-aware=yes
notify=notify-send -a ${app-id} -i ${app-id} ${title} ${body}

[cursor]
style=block
blink=no

[mouse]
hide-when-typing=yes

[scrollback]
lines=10000
multiplier=3.0

[url]
launch=xdg-open ${url}
osc8-underline=url-mode

[colors]
# Gruvbox Material Dark (medium)
background=282828
foreground=d4be98

selection-background=504945
selection-foreground=d4be98

# Normal colors
regular0=3c3836
regular1=ea6962
regular2=a9b665
regular3=d8a657
regular4=7daea3
regular5=d3869b
regular6=89b482
regular7=d4be98

# Bright colors
bright0=504945
bright1=ea6962
bright2=a9b665
bright3=d8a657
bright4=7daea3
bright5=d3869b
bright6=89b482
bright7=ddc7a1

[key-bindings]
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
search-start=Control+Shift+r
font-increase=Control+plus
font-decrease=Control+minus
font-reset=Control+0
