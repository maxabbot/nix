# ============================================================================
# Kitty Terminal — Gruvbox Material Dark
# ============================================================================

# Font
font_family      FiraCode Nerd Font
bold_font        FiraCode Nerd Font Bold
italic_font      FiraCode Nerd Font Italic
bold_italic_font FiraCode Nerd Font Bold Italic
font_size        12.0
disable_ligatures never

# Cursor
cursor_shape          block
cursor_blink_interval 0

# Scrollback
scrollback_lines 10000

# Bell
enable_audio_bell no
visual_bell_duration 0.0

# Window
window_padding_width  8
remember_window_size  yes
resize_in_steps       yes
confirm_os_window_close 0

# Tab bar
tab_bar_edge               top
tab_bar_style              powerline
tab_powerline_style        slanted
active_tab_font_style      bold
inactive_tab_font_style    normal
tab_title_template         "{index}: {title}"

# URL handling
url_style curly
open_url_with default
detect_urls yes

# Clipboard
copy_on_select yes
strip_trailing_spaces smart

# ============================================================================
# Color scheme — Gruvbox Material Dark (medium)
# ============================================================================

foreground            #d4be98
background            #282828
selection_foreground  #282828
selection_background  #d4be98

cursor                #d4be98
cursor_text_color     #282828

url_color             #7daea3

active_border_color   #7daea3
inactive_border_color #504945
bell_border_color     #d8a657

active_tab_foreground   #1d2021
active_tab_background   #7daea3
inactive_tab_foreground #d4be98
inactive_tab_background #3c3836
tab_bar_background      #1d2021

