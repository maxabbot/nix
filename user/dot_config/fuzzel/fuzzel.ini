# ============================================================================
# Fuzzel Configuration — Gruvbox Material Dark
# ============================================================================

[main]
font=JetBrainsMono Nerd Font:size=12
dpi-aware=auto
prompt=
# Icons from papirus-icon-theme
icons-enabled=yes
icon-theme=Papirus-Dark

# Show 10 results
lines=10
width=40
horizontal-pad=20
vertical-pad=8
inner-pad=4

# Fuzzy matching
fuzzy=yes

# Terminal for terminal apps
terminal=kitty

[colors]
# Gruvbox Material Dark
background=282828f2
text=d4be98ff
match=7daea3ff
selection=3c3836ff
selection-text=d4be98ff
selection-match=7daea3ff
border=7daea34d

[border]
width=2
radius=10

[dmenu]
exit-immediately-if-empty=yes
