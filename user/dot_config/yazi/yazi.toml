[manager]
ratio          = [1, 3, 4]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "size"
show_hidden    = true
show_symlink   = true

[preview]
tab_size   = 2
max_width  = 600
max_height = 900

[opener]
edit = [
  { run = 'hx "$@"', desc = "Helix", block = true },
]
open = [
  { run = 'xdg-open "$@"', desc = "Open" },
]
reveal = [
  { run = 'xdg-open "$(dirname "$@")"', desc = "Reveal in file manager" },
]

[open]
rules = [
  { name = "*/",              use = ["edit", "open"] },
  { mime = "text/*",          use = ["edit", "open"] },
  { mime = "image/*",         use = ["open"] },
  { mime = "video/*",         use = ["open"] },
  { mime = "audio/*",         use = ["open"] },
  { mime = "application/pdf", use = ["open"] },
  { mime = "*",               use = ["edit", "open"] },
]

[tasks]
micro_workers    = 10
macro_workers    = 5
bizarre_retry    = 5
image_alloc      = 536870912
image_bound      = [0, 0]
suppress_preload = false

[log]
enabled = false
